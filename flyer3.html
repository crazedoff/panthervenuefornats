<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantherVenue Flyer Generator</title>

    <!-- Google Fonts to match the flyer's style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>

    <!-- Third-party libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e9e9e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            margin: 0;
        }

        /* --- THE FIX IS HERE --- */
        #flyer-container {
            position: relative;
            width: 1080px;
            height: 1350px;
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            
            /* The template is now a CSS background, the correct approach */
            background-image: url('https://hc-cdn.hel1.your-objectstorage.com/s/v3/bd0262f544e32438cdc972af448e2d38ecad1ffa_panthervenue_event_flyer.png');
            background-size: cover; /* Ensures it fits the container */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Each dynamic element is an overlay positioned on top of the background. */
        .overlay {
            position: absolute;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        #title {
            top: 220px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 130px;
            color: #383838;
            font-weight: 900;
            line-height: 1;
        }
        
        #event-image {
            top: 411px;
            left: 171px;
            width: 738px;
            height: 338px;
            object-fit: cover;
            border-radius: 18px; /* Match the rounded corners of the template's frame */
        }
        
        #description {
            top: 815px;
            left: 60px;
            width: 460px;
            height: 185px;
            color: white;
            padding: 20px;
            font-size: 26px;
            font-weight: 400;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: left;
        }

        .info-pill {
            top: 815px;
            height: 75px;
            padding: 10px 25px;
            color: white;
            border-radius: 15px;
            font-size: 32px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .info-pill i { margin-right: 15px; }

        #price {
            left: 575px;
            width: 215px;
        }

        #date {
            left: 805px;
            width: 215px;
        }
        
        #qr-code-container {
            top: 1085px;
            left: 710px;
            width: 250px;
            height: 250px;
            background-color: white;
            padding: 10px; /* Padding to create the white border */
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Style the image generated by QRCode.js */
        #qr-code-container img {
            width: 100% !important;
            height: 100% !important;
        }
        
        #download-btn {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background-color: #B52A2D;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #download-btn:hover {
            background-color: #8c1e20;
        }
    </style>
</head>
<body>

    <h1>PantherVenue Flyer Preview</h1>
    <p>Change values in the script tag to update the flyer. Then click download.</p>

    <div id="flyer-container">
        <!-- The background image is now set via CSS on this container. -->
        <!-- The <img id="background-img"> has been REMOVED. -->

        <!-- All other elements are layered on top of the background image -->
        <div id="title" class="overlay"></div>
        <img id="event-image" class="overlay" src="" crossorigin="anonymous" alt="Event Image">
        <div id="description" class="overlay"></div>
        <div id="price" class="overlay info-pill"></div>
        <div id="date" class="overlay info-pill"></div>
        <div id="qr-code-container" class="overlay"></div>
    </div>

    <button id="download-btn">Download Flyer</button>

    <script>
        // --- STEP 1: DEFINE ALL THE FLYER'S DATA HERE ---
        const flyerData = {
            title: "Math Olympiad",
            // Using a working CDN link for olympiad.png
            eventImage: "https://hc-cdn.hel1.your-objectstorage.com/s/v3/9e78e1b658d5236780c88506085a8553f1f77d4c_olympiad.png",
            description: "District-wide mathematics competition for grades 9-12 with exciting prizes and recognition.",
            price: "$10.00",
            date: "7/30/2025",
            // The QR code can link to the event page or a ticket validation URL
            qrCodeData: "https://panther-venue.vercel.app/event.html#event-7", 
            downloadFileName: "PantherVenue_Math_Olympiad_Flyer.png"
        };

        // --- STEP 2: POPULATE THE OVERLAYS WHEN THE PAGE LOADS ---
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('title').innerText = flyerData.title;
            document.getElementById('event-image').src = flyerData.eventImage;
            document.getElementById('description').innerText = flyerData.description;
            document.getElementById('price').innerHTML = `<i class="fas fa-dollar-sign"></i> ${flyerData.price}`;
            document.getElementById('date').innerHTML = `<i class="fas fa-calendar-alt"></i> ${flyerData.date}`;

            // Generate the QR Code
            const qrCodeContainer = document.getElementById('qr-code-container');
            new QRCode(qrCodeContainer, {
                text: flyerData.qrCodeData,
                width: 230, // Slightly smaller to fit inside the padding
                height: 230,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        });

        // --- STEP 3: HANDLE THE DOWNLOAD BUTTON CLICK ---
        document.getElementById('download-btn').addEventListener('click', function() {
            const flyerElement = document.getElementById('flyer-container');
            console.log("Generating image from flyer element...");

            // Use html2canvas with options to handle cross-origin images
            html2canvas(flyerElement, {
                useCORS: true,      // Essential for loading external images
                allowTaint: true,   // Helps in some browser configurations
                scale: 2            // Increase scale for higher resolution output
            }).then(canvas => {
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = flyerData.downloadFileName;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                console.log("Download initiated.");
            }).catch(error => {
                console.error("Oops, html2canvas failed! This is often a CORS issue with images.", error);
                alert("Could not generate the flyer. One of the images might be blocked. Please check the console for errors.");
            });
        });
    </script>

</body>
</html>
