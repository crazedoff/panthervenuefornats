<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantherVenue Flyer Generator</title>

    <!-- Google Fonts to match the flyer's style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Third-party libraries -->
    <!-- For converting HTML to an image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- For generating the QR code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e9e9e9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* This is the main container for the flyer. It has a fixed aspect ratio. */
        #flyer-container {
            position: relative;
            width: 1080px;
            height: 1350px;
            overflow: hidden; /* Ensures nothing spills out */
        }
        
        /* --- THE FIX: The background is now an <img> tag --- */
        #background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Placed at the very bottom layer */
        }

        /* Each element is positioned absolutely on top of the background */
        .overlay {
            position: absolute;
            color: #2c2c2c;
            font-weight: 700;
            z-index: 1; /* All overlays are on a higher layer than the background */
        }

        #title {
            top: 215px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 115px;
            color: #383838;
            font-weight: 900;
            line-height: 1.1;
        }
        
        #event-image {
            top: 420px;
            left: 175px;
            width: 730px;
            height: 330px;
            object-fit: cover; /* Ensures the image covers the area without distortion */
            border-radius: 25px;
        }
        
        .side-tag {
            position: absolute;
            background-color: #B52A2D;
            color: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            z-index: 1; /* Also on top */
        }

        #left-tag {
            top: 550px;
            left: -10px;
            transform: rotate(-10deg);
        }

        #right-tag {
            top: 550px;
            right: 20px;
            transform: rotate(10deg);
        }

        #description {
            top: 800px;
            left: 55px;
            width: 450px;
            font-size: 28px;
            line-height: 1.4;
            color: #383838;
        }

        #price {
            top: 800px;
            left: 580px;
            width: 200px;
            height: 70px;
            font-size: 36px;
            color: white;
            background-color: #B52A2D;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #date {
            top: 800px;
            left: 810px;
            width: 200px;
            height: 70px;
            font-size: 32px;
            color: white;
            background-color: #B52A2D;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info-line {
            display: flex;
            align-items: center;
            font-size: 24px;
            color: #383838;
        }
        
        .info-line img {
            width: 32px;
            height: 32px;
            margin-right: 15px;
        }

        #phone {
            top: 900px;
            left: 580px;
        }

        #location {
            top: 955px;
            left: 580px;
            width: 450px;
        }
        
        #qr-code-container {
            top: 1088px;
            left: 710px;
            width: 256px;
            height: 256px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Style the image generated by QRCode.js */
        #qr-code-container img {
            width: 100% !important;
            height: 100% !important;
        }
        
        #download-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background-color: #B52A2D;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #download-btn:hover {
            background-color: #8c1e20;
        }
    </style>
</head>
<body>

    <h1>PantherVenue Flyer Preview</h1>
    <p>Change values in the script tag to update the flyer. Then click download.</p>

    <!-- This is the container that will be turned into an image -->
    <div id="flyer-container">
        <!-- THE FIX: The background is now a real <img> tag with crossorigin="anonymous" -->
        <img id="background-img" src="https://hc-cdn.hel1.your-objectstorage.com/s/v3/1fe55a0e39ddba374906647406ecf206f083efbd_screenshot_2025-06-16_at_5.45.34___pm.png" crossorigin="anonymous" alt="Flyer Background">

        <!-- All other elements will be layered on top -->
        <div id="title" class="overlay"></div>
        <img id="event-image" class="overlay" src="" crossorigin="anonymous" alt="Event Image">
        <div id="left-tag" class="side-tag"></div>
        <div id="right-tag" class="side-tag"></div>
        <div id="description" class="overlay"></div>
        <div id="price" class="overlay"></div>
        <div id="date" class="overlay"></div>
        <div id="phone" class="overlay info-line">
            <img src="https://img.icons8.com/ios-filled/50/B52A2D/phone.png" alt="phone icon"/>
            <span id="phone-text"></span>
        </div>
        <div id="location" class="overlay info-line">
            <img src="https://img.icons8.com/ios-filled/50/B52A2D/marker.png" alt="location icon"/>
            <span id="location-text"></span>
        </div>
        <div id="qr-code-container" class="overlay"></div>
    </div>

    <button id="download-btn">Download Flyer</button>

    <script>
        // --- STEP 1: DEFINE ALL THE FLYER'S DATA HERE ---
        const flyerData = {
            title: "Fall College Fair",
            eventImage: "https://i.imgur.com/k6O6M88.jpeg", // Using an imgur link of the filled flyer image for demonstration
            leftTag: "Gathering Event",
            rightTag: "Large Gym",
            description: "Meet representatives from top universities nationwide and explore academic opportunities.",
            price: "FREE",
            date: "4/16/2025",
            phone: "(908) 231-8660",
            location: "600 Garretson Road, Bridgewater, New Jersey",
            qrCodeData: "https://hc-cdn.hel1.your-objectstorage.com/s/v3/1fe55a0e39ddba374906647406ecf206f083efbd_screenshot_2025-06-16_at_5.45.34___pm.png",
            downloadFileName: "Fall_College_Fair_Ticket.png"
        };

        // --- STEP 2: POPULATE THE FLYER WHEN THE PAGE LOADS ---
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('title').innerText = flyerData.title;
            document.getElementById('left-tag').innerText = flyerData.leftTag;
            document.getElementById('right-tag').innerText = flyerData.rightTag;
            document.getElementById('description').innerText = flyerData.description;
            document.getElementById('price').innerText = flyerData.price;
            document.getElementById('date').innerText = flyerData.date;
            document.getElementById('phone-text').innerText = flyerData.phone;
            document.getElementById('location-text').innerText = flyerData.location;
            document.getElementById('event-image').src = flyerData.eventImage;

            const qrCodeContainer = document.getElementById('qr-code-container');
            new QRCode(qrCodeContainer, {
                text: flyerData.qrCodeData,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        });

        // --- STEP 3: HANDLE THE DOWNLOAD BUTTON CLICK ---
        document.getElementById('download-btn').addEventListener('click', function() {
            const flyerElement = document.getElementById('flyer-container');
            console.log("Generating image from flyer element...");

            // Use html2canvas with options to handle cross-origin images
            html2canvas(flyerElement, {
                useCORS: true, // This must be true to attempt loading cross-origin images
                allowTaint: true, // This allows loading of images, but we rely on useCORS and the crossorigin attribute
                scale: 2 // Increase scale for higher resolution output
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = image;
                link.download = flyerData.downloadFileName;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                console.log("Download initiated.");
            }).catch(error => {
                console.error("Oops, html2canvas failed!", error);
            });
        });
    </script>

</body>
</html>
